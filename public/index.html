<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        background-color: #000000;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
      
      /* Initial App Loading Screen Styles */
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .loader-brand {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        background: linear-gradient(90deg, #ffffff, #a0a0a0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .loader-subtitle {
        font-size: 14px;
        color: #888888;
        margin-bottom: 32px;
        font-weight: 500;
      }
      .loader-dots {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }
      .dot:nth-child(1) { animation-delay: -0.45s; }
      .dot:nth-child(2) { animation-delay: -0.30s; }
      .dot:nth-child(3) { animation-delay: -0.15s; }
      .dot:nth-child(4) { animation-delay: 0s; }
      
      @keyframes bounce {
        0%, 80%, 100% { 
          transform: scale(0.4); 
          opacity: 0.3; 
        }
        40% { 
          transform: scale(1); 
          opacity: 1; 
        }
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root">
      <div id="initial-loader">
        <div class="loader-brand">Crimchart</div>
        <div class="loader-subtitle">Loading experience...</div>
        <div class="loader-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </body>
</html>
