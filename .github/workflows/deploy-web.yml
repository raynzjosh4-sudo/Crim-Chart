name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web export
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_CLOUDFLARE_R2_ENDPOINT: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_R2_ENDPOINT }}
          EXPO_PUBLIC_CLOUDFLARE_R2_BUCKET_NAME: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_R2_BUCKET_NAME }}
          EXPO_PUBLIC_CLOUDFLARE_R2_PUBLIC_BASE: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_R2_PUBLIC_BASE }}
          EXPO_PUBLIC_CLOUDFLARE_R2_ACCESS_KEY_ID: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_R2_ACCESS_KEY_ID }}
          EXPO_PUBLIC_CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

      - name: Add CNAME for custom domain
        run: echo "crimchart.com" > dist/CNAME

      - name: Create 404 fallback for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
