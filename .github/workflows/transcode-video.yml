name: Transcode Video to HLS

on:
  repository_dispatch:
    types: [transcode-video]

jobs:
  transcode:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download raw video from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          VIDEO_FILENAME="${{ github.event.client_payload.videoFilename }}"
          USER_ID="${{ github.event.client_payload.userId }}"
          echo "VIDEO_FILENAME=$VIDEO_FILENAME" >> $GITHUB_ENV
          echo "USER_ID=$USER_ID" >> $GITHUB_ENV
          echo "Downloading raw video: $VIDEO_FILENAME"
          aws s3 cp \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            s3://crimchart-media-bucket/raw/$VIDEO_FILENAME \
            ./input.mp4

      - name: Transcode to HLS with FFmpeg
        run: |
          mkdir -p ./hls_output
          CLEAN_NAME="${VIDEO_FILENAME%.mp4}"
          
          HAS_AUDIO=$(ffprobe -i ./input.mp4 -show_streams -select_streams a -loglevel error | grep codec_type=audio || true)
          
          if [ -n "$HAS_AUDIO" ]; then
            echo "Audio stream found. Transcoding with ABR (Video + Audio)."
            ffmpeg -i ./input.mp4 \
              -filter_complex "[0:v]split=3[v1][v2][v3]; [v1]scale=w=1080:h=1920:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v1out]; [v2]scale=w=720:h=1280:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v2out]; [v3]scale=w=480:h=854:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v3out]" \
              -map "[v1out]" -c:v:0 libx264 -b:v:0 3000k -maxrate:v:0 3000k -bufsize:v:0 6000k -preset veryfast -g 48 -sc_threshold 0 \
              -map "[v2out]" -c:v:1 libx264 -b:v:1 1500k -maxrate:v:1 1500k -bufsize:v:1 3000k -preset veryfast -g 48 -sc_threshold 0 \
              -map "[v3out]" -c:v:2 libx264 -b:v:2 800k -maxrate:v:2 800k -bufsize:v:2 1600k -preset veryfast -g 48 -sc_threshold 0 \
              -map 0:a:0 -c:a:0 aac -b:a:0 128k \
              -map 0:a:0 -c:a:1 aac -b:a:1 128k \
              -map 0:a:0 -c:a:2 aac -b:a:2 96k \
              -f hls -hls_time 4 -hls_playlist_type vod -hls_flags independent_segments \
              -hls_segment_type mpegts -hls_segment_filename "./hls_output/stream_%v_data%03d.ts" \
              -master_pl_name playlist.m3u8 -var_stream_map "v:0,a:0 v:1,a:1 v:2,a:2" "./hls_output/stream_%v_playlist.m3u8"
          else
            echo "No audio stream found. Transcoding with ABR (Video Only)."
            ffmpeg -i ./input.mp4 \
              -filter_complex "[0:v]split=3[v1][v2][v3]; [v1]scale=w=1080:h=1920:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v1out]; [v2]scale=w=720:h=1280:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v2out]; [v3]scale=w=480:h=854:force_original_aspect_ratio=decrease,scale=trunc(iw/2)*2:trunc(ih/2)*2[v3out]" \
              -map "[v1out]" -c:v:0 libx264 -b:v:0 3000k -maxrate:v:0 3000k -bufsize:v:0 6000k -preset veryfast -g 48 -sc_threshold 0 \
              -map "[v2out]" -c:v:1 libx264 -b:v:1 1500k -maxrate:v:1 1500k -bufsize:v:1 3000k -preset veryfast -g 48 -sc_threshold 0 \
              -map "[v3out]" -c:v:2 libx264 -b:v:2 800k -maxrate:v:2 800k -bufsize:v:2 1600k -preset veryfast -g 48 -sc_threshold 0 \
              -f hls -hls_time 4 -hls_playlist_type vod -hls_flags independent_segments \
              -hls_segment_type mpegts -hls_segment_filename "./hls_output/stream_%v_data%03d.ts" \
              -master_pl_name playlist.m3u8 -var_stream_map "v:0 v:1 v:2" "./hls_output/stream_%v_playlist.m3u8"
          fi
          
          echo "CLEAN_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          echo "FFmpeg done. Files:"
          ls -la ./hls_output/

      - name: Upload HLS files to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          DEST="s3://crimchart-media-bucket/processed/$USER_ID/videos/$CLEAN_NAME/hls"
          echo "Uploading HLS files to: $DEST"
          
          # Upload .m3u8 playlist with correct content type
          aws s3 sync \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exclude "*" \
            --include "*.m3u8" \
            --content-type "application/vnd.apple.mpegurl" \
            ./hls_output/ \
            $DEST/
          
          # Upload .ts segments with correct content type
          aws s3 sync \
            --endpoint-url https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exclude "*" \
            --include "*.ts" \
            --content-type "video/mp2t" \
            ./hls_output/ \
            $DEST/
          
          echo "Upload complete!"
